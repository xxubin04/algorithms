name: Sync Codetree Subtree

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 01:00 (UTC 16:00)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # subtree는 전체 히스토리 필요

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add codetree remote
        run: |
          git remote add codetree https://github.com/xxubin04/codetree-algorithms.git || true
          git fetch codetree

      - name: Sync codetree subtree
        run: |
          if git log --oneline -- codetree | grep -q .; then
            echo "Subtree exists → pulling updates"
            git subtree pull \
              --prefix=codetree \
              https://github.com/xxubin04/codetree-algorithms.git \
              main \
              --squash \
              -m "chore(subtree): sync codetree"
          else
            echo "Subtree not found → adding subtree"
            git subtree add \
              --prefix=codetree \
              https://github.com/xxubin04/codetree-algorithms.git \
              main \
              --squash
          fi

      - name: Push updated subtree
        run: |
          git push origin main
